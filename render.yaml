services:
  - type: web
    name: public-safety-backend
    env: java
    plan: free
    buildCommand: "cd backend && mvn -DskipTests package"
    startCommand: "cd backend && java -jar target/*.jar"
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: PUBLIC_SAFETY_JWT_SECRET
        sync: false
      - key: PUBLIC_SAFETY_POLICE_ACCESS_CODE
        value: POLICE-2026
      - key: BOOTSTRAP_POLICE_EMAIL
        value: officer@police.local
      - key: BOOTSTRAP_POLICE_PASSWORD
        value: Police@123
      - key: BOOTSTRAP_POLICE_NAME
        value: Officer Demo
      - key: BOOTSTRAP_POLICE_PHONE
        value: "1000000000"
      - key: BOOTSTRAP_POLICE_BADGE
        value: PS-001
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "*"
